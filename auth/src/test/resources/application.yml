sauvest:
  applicationName: sauvest-auth

spring:
  application:
    name: ${sauvest.applicationName}
  datasource:
    url: jdbc:h2:mem:testdb
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/auth-cumulative.xml
    enabled: true

jwt:
  expiration-time: 600s
  secret: secret

